name: rediseno-ui-ux-completo
description: Rediseño completo de UI/UX del sistema de gestión escolar manteniendo el backend Flask existente
status: proposed
schema: spec-driven

apply:
  requires:
    - proposal
    - design
    - tasks

artifacts:
  proposal:
    description: Propuesta del cambio con alcance, objetivos y justificación
    output: proposal.md
    status: done
  design:
    description: Diseño técnico detallado con referencias visuales, estructura de componentes y plan de migración
    output: design.md
    status: done
    dependencies:
      - proposal
  tasks:
    description: Lista detallada de tareas de implementación
    output: tasks.md
    status: done
    dependencies:
      - design
