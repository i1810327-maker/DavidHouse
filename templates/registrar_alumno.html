{% extends "base.html" %}
{% block title %}Registrar Estudiante{% endblock %}

{% block content %}
<div class="card form-container">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px;">
        <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:white;font-size:20px;"><i class="fas fa-user-graduate"></i></div>
        <div>
            <h2 style="font-size:20px;color:var(--text);margin:0;">Registrar Nuevo Estudiante</h2>
            <p style="color:var(--text-secondary);font-size:13px;margin:2px 0 0 0;">Complete los campos del apoderado y estudiante</p>
        </div>
    </div>
    <div style="border-bottom:1px solid var(--border);margin:16px 0 24px;"></div>

    <form method="POST" action="{{ url_for('directora.registrar_alumno') }}" onsubmit="return disableSubmitButton(this)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <h3 style="font-size:15px;color:var(--primary);margin:0;"><i class="fas fa-user-tie"></i> Datos del Apoderado</h3>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;margin-left:auto;">
                <input type="checkbox" name="apoderado_activo" checked onchange="toggleApoderado(this)">
                <span style="font-weight:500;color:var(--text-secondary);">Agregar apoderado</span>
            </label>
        </div>
        <div class="form-grid" id="apoderado-fields">
            <div class="form-group">
                <label for="apoderado_dni" class="form-label">DNI *</label>
                <div class="dni-wrapper">
                    <input type="text" id="apoderado_dni" name="apoderado_dni" placeholder="12345678" maxlength="8" pattern="[0-9]{1,8}" oninput="this.value=this.value.replace(/[^0-9]/g,''); onDniInput('apoderado')" class="form-control" title="Solo números (8 dígitos máximo)" autocomplete="off">
                    <button type="button" class="btn-consultar-dni" onclick="consultarDNI('apoderado')" id="btn-apoderado" title="Buscar en RENIEC"><i class="fas fa-search"></i></button>
                </div>
                <div class="dni-status" id="status-apoderado"></div>
            </div>
            <div class="form-group">
                <label for="apoderado_nombres" class="form-label">Nombres *</label>
                <input type="text" id="apoderado_nombres" name="apoderado_nombres" placeholder="Juan" maxlength="60" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="apoderado_apellido_paterno" class="form-label">Apellido Paterno *</label>
                <input type="text" id="apoderado_apellido_paterno" name="apoderado_apellido_paterno" placeholder="García" maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="apoderado_apellido_materno" class="form-label">Apellido Materno *</label>
                <input type="text" id="apoderado_apellido_materno" name="apoderado_apellido_materno" placeholder="López" maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="apoderado_telefono_principal" class="form-label">Teléfono Principal *</label>
                <input type="text" id="apoderado_telefono_principal" name="apoderado_telefono_principal" placeholder="987654321" maxlength="12" pattern="[0-9]+" oninput="this.value=this.value.replace(/[^0-9]/g,'')" class="form-control" title="Solo números">
            </div>
            <div class="form-group">
                <label for="apoderado_telefono_secundario" class="form-label">Teléfono Secundario</label>
                <input type="text" id="apoderado_telefono_secundario" name="apoderado_telefono_secundario" placeholder="912345678" maxlength="12" pattern="[0-9]+" oninput="this.value=this.value.replace(/[^0-9]/g,'')" class="form-control" title="Solo números">
            </div>
        </div>

        <div style="border-bottom:1px solid var(--border);margin:20px 0 24px;"></div>

        <h3 style="font-size:15px;color:var(--primary);margin-bottom:16px;"><i class="fas fa-user"></i> Datos del Estudiante</h3>
        <div class="form-grid">
            <div class="form-group">
                <label for="dni" class="form-label">DNI *</label>
                <div class="dni-wrapper">
                    <input type="text" id="dni" name="dni" placeholder="12345678" required maxlength="8" pattern="[0-9]{1,8}" oninput="this.value=this.value.replace(/[^0-9]/g,''); onDniInput('alumno')" class="form-control" title="Solo números (8 dígitos máximo)" autocomplete="off">
                    <button type="button" class="btn-consultar-dni" onclick="consultarDNI('alumno')" id="btn-alumno" title="Buscar en RENIEC"><i class="fas fa-search"></i></button>
                </div>
                <div class="dni-status" id="status-alumno"></div>
            </div>
            <div class="form-group">
                <label for="nombres" class="form-label">Nombres *</label>
                <input type="text" id="nombres" name="nombres" placeholder="Juan" required maxlength="60" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="apellido_paterno" class="form-label">Apellido Paterno *</label>
                <input type="text" id="apellido_paterno" name="apellido_paterno" placeholder="García" required maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="apellido_materno" class="form-label">Apellido Materno *</label>
                <input type="text" id="apellido_materno" name="apellido_materno" placeholder="López" required maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]+" oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑüÜ\s]/g,'')" class="form-control" title="Solo letras y espacios">
            </div>
            <div class="form-group">
                <label for="correo" class="form-label">Correo *</label>
                <input type="email" id="correo" name="correo" placeholder="alumno@colegio.edu.pe" required maxlength="100" class="form-control">
            </div>
            <div class="form-group">
                <label for="clave" class="form-label">Contraseña *</label>
                <div style="position:relative;">
                    <input type="password" id="clave" name="clave" placeholder="Contraseña segura" required maxlength="50" style="padding-right:40px;" class="form-control">
                    <button type="button" class="password-toggle" onclick="togglePassword(this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
        </div>

        <h3 style="font-size:15px;color:var(--primary);margin:24px 0 16px;"><i class="fas fa-graduation-cap"></i> Asignación</h3>
        <div class="form-grid-3">
            <div class="form-group">
                <label for="nivel_id" class="form-label">Nivel *</label>
                <select id="nivel_id" name="nivel_id" onchange="filtrarGrados()" required class="form-select">
                    <option value="">-- Selecciona un nivel --</option>
                    {% for n in niveles %}<option value="{{ n.id }}">{{ n.nombre }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="grado_id" class="form-label">Grado *</label>
                <select id="grado_id" name="grado_id" onchange="filtrarSecciones()" required disabled class="form-select">
                    <option value="">-- Primero selecciona un nivel --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="seccion_id" class="form-label">Sección *</label>
                <select id="seccion_id" name="seccion_id" required disabled class="form-select">
                    <option value="">-- Primero selecciona un grado --</option>
                </select>
            </div>
        </div>

        <div style="display:flex;gap:12px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Registrar Estudiante</button>
            <a href="{{ url_for('directora.dashboard') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<script>
    const gradosData = JSON.parse('{{ grados_data | default([]) | tojson | safe }}');

    // ── CONFIG API RENIEC ──────────────────────────────────────────────
    const API_TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6ImkyNTEzNzAyQGNvbnRpbmVudGFsLmVkdS5wZSJ9.o02LSzKdddnW-h9XO-sf5hFbquw5vroU6ZAoFhbl9mY';
    const API_BASE  = 'https://dniruc.apisperu.com/api/v1/dni/';

    const CAMPOS = {
        alumno: {
            dni:     'dni',
            nombres: 'nombres',
            apPat:   'apellido_paterno',
            apMat:   'apellido_materno',
            btn:     'btn-alumno',
            status:  'status-alumno',
        },
        apoderado: {
            dni:     'apoderado_dni',
            nombres: 'apoderado_nombres',
            apPat:   'apoderado_apellido_paterno',
            apMat:   'apoderado_apellido_materno',
            btn:     'btn-apoderado',
            status:  'status-apoderado',
        }
    };

    async function consultarDNI(seccion) {
        const c = CAMPOS[seccion];
        const dniVal = document.getElementById(c.dni).value.trim();
        const statusEl = document.getElementById(c.status);
        const btnEl = document.getElementById(c.btn);

        if (!/^\d+$/.test(dniVal)) {
            setStatus(statusEl, 'error', 'El DNI solo debe contener n\u00fameros.');
            return;
        }
        if (dniVal.length !== 8) {
            setStatus(statusEl, 'error', 'El DNI debe tener exactamente 8 d\u00edgitos.');
            return;
        }

        setStatus(statusEl, 'loading', '<span class="spinner"></span> Consultando RENIEC...');
        btnEl.disabled = true;

        try {
            const response = await fetch(API_BASE + dniVal + '?token=' + API_TOKEN);
            if (!response.ok) {
                if (response.status === 401) setStatus(statusEl, 'error', 'Token de API inv\u00e1lido o expirado.');
                else setStatus(statusEl, 'error', 'Error del servidor (c\u00f3digo ' + response.status + ').');
                return;
            }
            const data = await response.json();
            if (!data.nombres) {
                setStatus(statusEl, 'error', 'DNI no encontrado en RENIEC.');
                return;
            }
            autoFill(c.nombres, capitalizarNombre(data.nombres));
            autoFill(c.apPat,   capitalizarNombre(data.apellidoPaterno));
            autoFill(c.apMat,   capitalizarNombre(data.apellidoMaterno));
            setStatus(statusEl, 'success', '\u2714 Datos cargados correctamente desde RENIEC.');
        } catch (err) {
            console.error('Error consultando DNI:', err);
            setStatus(statusEl, 'error', '\u2716 No se pudo conectar con la API.');
        } finally {
            btnEl.disabled = false;
        }
    }

    function autoFill(fieldId, valor) {
        var el = document.getElementById(fieldId);
        if (!el) return;
        el.value = valor;
        el.classList.add('field-autofilled');
        setTimeout(function() { el.classList.remove('field-autofilled'); }, 2500);
    }

    function setStatus(el, tipo, html) {
        el.className = 'dni-status ' + tipo;
        el.innerHTML = html;
    }

    function capitalizarNombre(str) {
        if (!str) return '';
        return str.toLowerCase().replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function onDniInput(seccion) {
        var input = document.getElementById(CAMPOS[seccion].dni);
        var statusEl = document.getElementById(CAMPOS[seccion].status);
        if (input.value.length === 8) {
            consultarDNI(seccion);
        }
        if (input.value.length < 8 && statusEl) {
            statusEl.className = 'dni-status';
            statusEl.innerHTML = '';
        }
    }

    toggleApoderado(document.querySelector('[name="apoderado_activo"]'));

    function toggleApoderado(checkbox) {
        const fields = document.querySelectorAll('#apoderado-fields input');
        fields.forEach(function(inp) {
            inp.required = checkbox.checked;
            inp.closest('.form-group').style.opacity = checkbox.checked ? '1' : '0.4';
        });
    }

    function filtrarGrados() {
        const nivelSelect = document.getElementById('nivel_id');
        const gradoSelect = document.getElementById('grado_id');
        const seccionSelect = document.getElementById('seccion_id');
        const nivelSeleccionado = nivelSelect.value;
        gradoSelect.innerHTML = '';
        seccionSelect.innerHTML = '';
        gradoSelect.disabled = true;
        seccionSelect.disabled = true;
        if (!nivelSeleccionado) {
            gradoSelect.innerHTML = '<option value="">-- Primero selecciona un nivel --</option>';
            seccionSelect.innerHTML = '<option value="">-- Primero selecciona un grado --</option>';
            return;
        }
        const gradosFiltrados = gradosData.filter(g => g.nivel_id === parseInt(nivelSeleccionado));
        if (gradosFiltrados.length === 0) {
            gradoSelect.innerHTML = '<option value="">No hay grados disponibles</option>';
        } else {
            gradoSelect.innerHTML = '<option value="">-- Selecciona un grado --</option>';
            gradosFiltrados.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id; opt.textContent = g.nombre;
                gradoSelect.appendChild(opt);
            });
            gradoSelect.disabled = false;
        }
        filtrarSecciones();
    }

    function filtrarSecciones() {
        const gradoSelect = document.getElementById('grado_id');
        const seccionSelect = document.getElementById('seccion_id');
        const gradoSeleccionado = gradoSelect.value;
        seccionSelect.innerHTML = '';
        if (!gradoSeleccionado) {
            seccionSelect.innerHTML = '<option value="">-- Primero selecciona un grado --</option>';
            seccionSelect.disabled = true;
            return;
        }
        const grado = gradosData.find(g => g.id === parseInt(gradoSeleccionado));
        if (!grado || !grado.secciones || grado.secciones.length === 0) {
            seccionSelect.innerHTML = '<option value="">No hay secciones disponibles</option>';
            seccionSelect.disabled = true;
        } else {
            seccionSelect.innerHTML = '<option value="">-- Selecciona una sección --</option>';
            grado.secciones.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id; opt.textContent = s.nombre;
                seccionSelect.appendChild(opt);
            });
            seccionSelect.disabled = false;
        }
    }
</script>
{% endblock %}
