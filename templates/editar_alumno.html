{% extends "base.html" %}
{% block title %}Editar Estudiante{% endblock %}

{% block content %}
<div class="card">
    <h2>✏️ Editar Estudiante</h2>
    <p>Actualiza la información del estudiante.</p>
    <a href="{{ url_for('listar_alumnos') }}" class="btn btn-sm">← Volver a la Lista</a>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="dni">DNI</label>
            <input type="text" id="dni" name="dni" value="{{ alumno.dni }}" required>
        </div>

        <div class="form-group">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" name="nombres" value="{{ alumno.nombres }}" required>
        </div>

        <div class="form-group">
            <label for="apellido_paterno">Apellido Paterno</label>
            <input type="text" id="apellido_paterno" name="apellido_paterno" value="{{ alumno.apellido_paterno }}" required>
        </div>

        <div class="form-group">
            <label for="apellido_materno">Apellido Materno</label>
            <input type="text" id="apellido_materno" name="apellido_materno" value="{{ alumno.apellido_materno }}" required>
        </div>

        <div class="form-group">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" name="correo" value="{{ alumno.correo }}" required>
        </div>

        <div class="form-group">
            <label for="grado_id">Grado</label>
            <select id="grado_id" name="grado_id">
                <option value="">Seleccionar Grado</option>
                {% for grado in grados %}
                <option value="{{ grado.id }}" {% if alumno.grado_id == grado.id %}selected{% endif %}>{{ grado.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="seccion_id">Sección</label>
            <select id="seccion_id" name="seccion_id">
                <option value="">Seleccionar Sección</option>
                {% for seccion in secciones %}
                <option value="{{ seccion.id }}" {% if alumno.seccion_id == seccion.id %}selected{% endif %}>{{ seccion.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">Actualizar Estudiante</button>
    </form>
</div>
{% endblock %}
