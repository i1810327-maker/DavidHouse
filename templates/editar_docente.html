{% extends "base.html" %}
{% block title %}Editar Docente{% endblock %}

{% block content %}
<div class="card">
    <h2>✏️ Editar Docente</h2>
    <p>Actualiza la información del docente.</p>
    <a href="{{ url_for('listar_docentes') }}" class="btn btn-sm">← Volver a la Lista</a>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="dni">DNI</label>
            <input type="text" id="dni" name="dni" value="{{ docente.dni }}" required>
        </div>

        <div class="form-group">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" name="nombres" value="{{ docente.nombres }}" required>
        </div>

        <div class="form-group">
            <label for="apellido_paterno">Apellido Paterno</label>
            <input type="text" id="apellido_paterno" name="apellido_paterno" value="{{ docente.apellido_paterno }}" required>
        </div>

        <div class="form-group">
            <label for="apellido_materno">Apellido Materno</label>
            <input type="text" id="apellido_materno" name="apellido_materno" value="{{ docente.apellido_materno }}" required>
        </div>

        <div class="form-group">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" name="correo" value="{{ docente.correo }}" required>
        </div>

        <div class="form-group">
            <label for="profesion">Profesión</label>
            <input type="text" id="profesion" name="profesion" value="{{ docente.profesion }}">
        </div>

        <div class="form-group">
            <label for="tiene_especialidad">¿Tiene Especialidad?</label>
            <input type="checkbox" id="tiene_especialidad" name="tiene_especialidad" {% if docente.tiene_especialidad %}checked{% endif %}>
        </div>

        <div class="form-group" id="especialidad_group" style="{% if not docente.tiene_especialidad %}display: none;{% endif %}">
            <label for="descripcion_especialidad">Descripción de Especialidad</label>
            <textarea id="descripcion_especialidad" name="descripcion_especialidad">{{ docente.descripcion_especialidad }}</textarea>
        </div>

        <button type="submit" class="btn">Actualizar Docente</button>
    </form>
</div>

<script>
document.getElementById('tiene_especialidad').addEventListener('change', function() {
    var group = document.getElementById('especialidad_group');
    if (this.checked) {
        group.style.display = 'block';
    } else {
        group.style.display = 'none';
    }
});
</script>
{% endblock %}
