<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - ColegioSys</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1><i class="fas fa-graduation-cap"></i> ColegioSys</h1>
    </header>

    <div class="container">
        <div class="card text-center error-card">
            <div class="error-icon">
                <i class="fas fa-triangle-exclamation"></i>
            </div>
            <h2 class="error-title">Algo salió mal</h2>
            <p class="error-text">
                {{ error }}
            </p>
            <div class="divider"></div>
            <p class="error-detail">
                Si el problema persiste, contacta al administrador del sistema.
            </p>
            <div class="btn-group flex-center">
                <a href="{{ url_for('index') }}" class="btn"> Ir al Inicio</a>
                <a href="{{ url_for('login') }}" class="btn btn-secondary"> Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <footer>
    </footer>
</body>
</html>
