<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - ColegioSys</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1>🎓 ColegioSys</h1>
    </header>

    <div class="container">
        <div class="card" style="text-align: center; max-width: 600px; margin: 50px auto;">
            <div style="font-size: 80px; margin-bottom: 20px;">
                ⚠️
            </div>
            <h2 style="color: #dc3545; margin-bottom: 15px;">Algo salió mal</h2>
            <p style="color: #666; font-size: 16px; margin-bottom: 25px;">
                {{ error }}
            </p>
            <div class="divider"></div>
            <p style="color: #999; margin-bottom: 25px;">
                Si el problema persiste, contacta al administrador del sistema.
            </p>
            <div class="btn-group" style="justify-content: center;">
                <a href="{{ url_for('index') }}" class="btn"> Ir al Inicio</a>
                <a href="{{ url_for('login') }}" class="btn btn-secondary"> Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <footer>
        <p><strong>© 2026 ColegioSys</strong> - Sistema de Gestión Educativa</p>
    </footer>
</body>
</html>
