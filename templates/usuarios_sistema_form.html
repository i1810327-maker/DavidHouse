{% extends "base.html" %}
{% block title %}Registrar Docente{% endblock %}

{% block content %}
<div class="card">
    <h2> Registrar Nuevo Docente</h2>
    <p style="color: #6b7280; margin-bottom: 20px;">Completa todos los datos para registrar un nuevo docente en el sistema.</p>

    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" placeholder="12345678" required>
            </div>

            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" placeholder="Nombre completo" required>
            </div>

            <div class="form-group">
                <label for="apellido_paterno">Apellido Paterno</label>
                <input type="text" id="apellido_paterno" name="apellido_paterno" placeholder="Apellido paterno" required>
            </div>

            <div class="form-group">
                <label for="apellido_materno">Apellido Materno</label>
                <input type="text" id="apellido_materno" name="apellido_materno" placeholder="Apellido materno" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="docente@email.com" required>
            </div>

            <div class="form-group">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave" placeholder="Contraseña segura" required>
            </div>

            <div class="form-group">
                <label for="profesion">Profesión</label>
                <input type="text" id="profesion" name="profesion" placeholder="Ej: Licenciado en Educación">
            </div>

            <div class="form-group" style="grid-column: 2; display: flex; align-items: flex-end;">
                <label style="display: flex; align-items: center; margin: 0;">
                    <input type="checkbox" name="tiene_especialidad" value="1" style="width: auto; margin-right: 8px;">
                    Tiene especialidad
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="descripcion_especialidad">Descripción de Especialidad (opcional)</label>
            <textarea id="descripcion_especialidad" name="descripcion_especialidad" placeholder="Describe tu especialidad o área de expertise"></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button type="submit"> Guardar Docente</button>
            <a href="{{ url_for('directora_dashboard') }}" class="btn btn-secondary"> Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
