{% extends "base.html" %}
{% block title %}Registrar Docente{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2> Registrar Nuevo Docente</h2>
    <p style="color: #6b7280; margin-bottom: 20px;">Completa todos los datos para registrar un nuevo docente en el sistema.</p>
    <div class="divider"></div>

    <form method="POST" onsubmit="return disableSubmitButton(this)">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="dni">* DNI *</label>
                <input type="text" id="dni" name="dni" placeholder="12345678" required maxlength="9" pattern="[0-9]*" oninput="validarDni(this)">
            </div>

            <div class="form-group">
                <label for="nombres">* Nombres *</label>
                <input type="text" id="nombres" name="nombres" placeholder="Juan" required maxlength="60" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]*" oninput="validarNombre(this)">
            </div>

            <div class="form-group">
                <label for="apellido_paterno">* Apellido Paterno *</label>
                <input type="text" id="apellido_paterno" name="apellido_paterno" placeholder="García" required maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]*" oninput="validarNombre(this)">
            </div>

            <div class="form-group">
                <label for="apellido_materno">* Apellido Materno *</label>
                <input type="text" id="apellido_materno" name="apellido_materno" placeholder="López" required maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]*" oninput="validarNombre(this)">
            </div>

            <div class="form-group">
                <label for="telefono_principal"> Teléfono Principal</label>
                <input type="text" id="telefono_principal" name="telefono_principal" placeholder="987654321" maxlength="12" oninput="validarTelefono(this, 'Teléfono Principal')">
            </div>

            <div class="form-group">
                <label for="telefono_secundario"> Teléfono Secundario</label>
                <input type="text" id="telefono_secundario" name="telefono_secundario" placeholder="912345678" maxlength="12" oninput="validarTelefono(this, 'Teléfono Secundario')" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="correo">* Correo Electrónico *</label>
                <input type="email" id="correo" name="correo" placeholder="docente@colegio.edu.pe" required maxlength="100" oninput="validarCorreo(this)">
            </div>

            <div class="form-group">
                <label for="clave">* Contraseña *</label>
                <input type="password" id="clave" name="clave" placeholder="Contraseña segura" required maxlength="50" oninput="validarClaveInput(this)">
            </div>

            <div class="form-group">
                <label for="profesion">* Profesión *</label>
                <input type="text" id="profesion" name="profesion" placeholder="Licenciado en Educación" required maxlength="100" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s\-\']*" oninput="validarNombre(this)">
            </div>

            <div class="form-group" style="display: flex; align-items: flex-end;">
                <label style="margin: 0; display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="tiene_especialidad" name="tiene_especialidad" value="1"
                           onchange="document.getElementById('campo_especialidad').style.display = this.checked ? 'block' : 'none'"
                           style="width: auto; margin-right: 8px;">
                    <span>¿Tiene especialidad?</span>
                </label>
            </div>

            <div class="form-group">
                <label for="nivel_docente">* Nivel *</label>
                <select id="nivel_docente" name="nivel_docente" onchange="filtrarGradosDocente()" required>
                    <option value="">-- Selecciona un nivel --</option>
                    <option value="inicial">Inicial</option>
                    <option value="primaria">Primaria</option>
                </select>
            </div>

            <div class="form-group">
                <label for="grado_docente_id">* Grado *</label>
                <select id="grado_docente_id" name="grado_docente_id" onchange="filtrarSeccionesDocente()" required disabled>
                    <option value="">-- Primero selecciona un nivel --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="seccion_docente_id">* Sección *</label>
                <select id="seccion_docente_id" name="seccion_docente_id" required disabled>
                    <option value="">-- Primero selecciona un grado --</option>
                </select>
            </div>
        </div>

        <div id="campo_especialidad" hidden style="margin-top: 20px;">
            <div class="form-group">
                <label for="descripcion_especialidad"> Descripción de Especialidad *</label>
                <textarea id="descripcion_especialidad" name="descripcion_especialidad"
                          placeholder="Describe tu área de especialidad, certificaciones o experiencia..."></textarea>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button type="submit" class="btn btn-primary"> Guardar Docente</button>
            <a href="{{ url_for('directora_dashboard') }}" class="btn btn-secondary"> Cancelar</a>
        </div>
    </form>
</div>

<script>
    const gradosData = JSON.parse('{{ grados_data | default([]) | tojson | safe }}');

    function filtrarGradosDocente() {
        const nivelSelect = document.getElementById('nivel_docente');
        const gradoSelect = document.getElementById('grado_docente_id');
        const seccionSelect = document.getElementById('seccion_docente_id');
        const nivelSeleccionado = nivelSelect.value;

        gradoSelect.innerHTML = '';
        seccionSelect.innerHTML = '';
        gradoSelect.disabled = true;
        seccionSelect.disabled = true;

        if (!nivelSeleccionado) {
            gradoSelect.innerHTML = '<option value="">-- Primero selecciona un nivel --</option>';
            seccionSelect.innerHTML = '<option value="">-- Primero selecciona un grado --</option>';
            return;
        }

        const gradosFiltrados = gradosData.filter(g => g.nivel === nivelSeleccionado);

        if (gradosFiltrados.length === 0) {
            gradoSelect.innerHTML = '<option value="">No hay grados disponibles</option>';
        } else {
            gradoSelect.innerHTML = '<option value="">-- Selecciona un grado --</option>';
            gradosFiltrados.forEach(grado => {
                var opt = document.createElement('option');
                opt.value = grado.id;
                opt.textContent = grado.nombre;
                gradoSelect.appendChild(opt);
            });
            gradoSelect.disabled = false;
        }
        filtrarSeccionesDocente();
    }

    function filtrarSeccionesDocente() {
        const gradoSelect = document.getElementById('grado_docente_id');
        const seccionSelect = document.getElementById('seccion_docente_id');
        const gradoSeleccionado = gradoSelect.value;

        seccionSelect.innerHTML = '';

        if (!gradoSeleccionado) {
            seccionSelect.innerHTML = '<option value="">-- Primero selecciona un grado --</option>';
            seccionSelect.disabled = true;
            return;
        }

        const grado = gradosData.find(g => g.id === parseInt(gradoSeleccionado));

        if (!grado || !grado.secciones || grado.secciones.length === 0) {
            seccionSelect.innerHTML = '<option value="">No hay secciones disponibles</option>';
            seccionSelect.disabled = true;
        } else {
            seccionSelect.innerHTML = '<option value="">-- Selecciona una sección --</option>';
            grado.secciones.forEach(seccion => {
                var opt = document.createElement('option');
                opt.value = seccion.id;
                opt.textContent = seccion.nombre;
                seccionSelect.appendChild(opt);
            });
            seccionSelect.disabled = false;
        }
    }

    function validarDni(input) {
        if (input.value && !/^\d*$/.test(input.value)) {
            input.setCustomValidity('El DNI debe contener solo números');
        } else if (input.value && input.value.length > 9) {
            input.setCustomValidity('El DNI debe tener máximo 9 caracteres');
        } else {
            input.setCustomValidity('');
        }
    }

    function validarNombre(input) {
        if (input.value && !/^[A-Za-zÁÉÍÓÚáéíóúÑñ\s\-\']*$/.test(input.value)) {
            input.setCustomValidity('Este campo debe contener solo letras y espacios');
        } else {
            input.setCustomValidity('');
        }
    }

    function validarCorreo(input) {
        if (input.value && input.value.length > 100) {
            input.setCustomValidity('El correo debe tener máximo 100 caracteres');
        } else if (input.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) {
            input.setCustomValidity('Ingrese un correo electrónico válido');
        } else {
            input.setCustomValidity('');
        }
    }

    function validarClaveInput(input) {
        if (input.value && input.value.length > 50) {
            input.setCustomValidity('La contraseña debe tener máximo 50 caracteres');
        } else {
            input.setCustomValidity('');
        }
    }

    function validarTelefono(input, campo) {
        if (input.value && !/^\d*$/.test(input.value)) {
            input.setCustomValidity(campo + ' debe contener solo números');
        } else if (input.value && input.value.length > 12) {
            input.setCustomValidity(campo + ' debe tener máximo 12 caracteres');
        } else {
            input.setCustomValidity('');
        }
    }
</script>
{% endblock %}
